<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Assembly Visualizer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #ffffff; font-family: sans-serif; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; display: block; }
        .ui-panel {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 280px; text-align: center; z-index: 1000;
        }
        .slider { width: 100%; accent-color: #FF6B00; margin: 10px 0; cursor: pointer; }
        .label { color: #FF6B00; font-weight: 800; font-size: 18px; margin-bottom: 5px; }
        #status { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <model-viewer id="viewer" src="assembly.glb" ar camera-controls environment-image="neutral" exposure="1.0">
        <div class="ui-panel">
            <div class="label">STEP: <span id="stepDisplay">5</span> / 5</div>
            <input type="range" min="1" max="5" value="5" class="slider" id="assemblySlider">
            <div id="status">CONNECTING...</div>
        </div>
    </model-viewer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const viewer = document.getElementById('viewer');
            const slider = document.getElementById('assemblySlider');
            const stepDisplay = document.getElementById('stepDisplay');
            const status = document.getElementById('status');

            function updateAssembly(step) {
                stepDisplay.innerText = step;
                if (!viewer.model || !viewer.model.nodes) return;

                console.log("Applying Visibility for Step: " + step);

                viewer.model.nodes.forEach(node => {
                    // Check for "Part_" in the name
                    if (node.name && node.name.toLowerCase().includes("part_")) {
                        const matches = node.name.match(/\d+/);
                        if (matches) {
                            const partNum = parseInt(matches[0]);
                            // The Logic: Hide if Part Number > Current Step
                            node.visible = (partNum <= step);
                        }
                    }
                });
            }

            slider.addEventListener('input', (e) => {
                updateAssembly(parseInt(e.target.value));
            });

            // The "Persistence" Loop: Checks every 100ms if nodes are ready
            viewer.addEventListener('load', () => {
                status.innerText = "MODEL DOWNLOADED...";
                
                const checkNodes = setInterval(() => {
                    if (viewer.model && viewer.model.nodes && viewer.model.nodes.length > 0) {
                        clearInterval(checkNodes); // Stop checking once ready
                        
                        status.innerText = "READY: " + viewer.model.nodes.length + " NODES";
                        
                        // Debug log to see exactly what Rhino named the parts
                        const names = viewer.model.nodes.map(n => n.name).filter(n => n);
                        console.log("--- NAMES DETECTED ---");
                        console.log(names);
                        
                        updateAssembly(parseInt(slider.value));
                    }
                }, 100);
            });
        });
    </script>
</body>
</html>
