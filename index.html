<script>
    const viewer = document.getElementById('viewer');
    const slider = document.getElementById('assemblySlider');
    const stepDisplay = document.getElementById('stepDisplay');
    const status = document.getElementById('status');

    function updateAssembly(step) {
        stepDisplay.innerText = step;
        
        // SAFETY CHECK: If the model or nodes aren't ready, stop here and don't crash
        if (!viewer.model || !viewer.model.nodes) {
            console.log("Waiting for nodes to be ready...");
            return;
        }

        // Loop through EVERY object. 
        // This will find BOTH your green mesh and your grey meshes!
        viewer.model.nodes.forEach(node => {
            if (node.name && node.name.toLowerCase().includes("part_")) {
                
                // Extract the number (e.g., finds 001 in "Part_001")
                const matches = node.name.match(/\d+/);
                if (matches) {
                    const partNum = parseInt(matches[0]);
                    // Toggle visibility based on the slider
                    node.visible = (partNum <= step);
                }
            }
        });
    }

    slider.addEventListener('input', (e) => {
        updateAssembly(parseInt(e.target.value));
    });

    // We wait for the 'load' event, then add a tiny 100ms delay 
    // to make sure the "nodes" list is fully built.
    viewer.addEventListener('load', () => {
        setTimeout(() => {
            console.log("--- MODEL DATA READY ---");
            
            // Check if nodes exist now
            if (viewer.model && viewer.model.nodes) {
                const names = viewer.model.nodes.map(n => n.name).filter(n => n != null);
                console.log("Names found in file:", names);
                status.innerText = "Model Ready: " + names.length + " objects found";
            }
            
            updateAssembly(parseInt(slider.value));
        }, 100); 
    });
</script>
