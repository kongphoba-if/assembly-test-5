<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Assembly Visualizer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #ffffff; font-family: sans-serif; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; display: block; }
        .ui-panel {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 280px; text-align: center; z-index: 1000;
        }
        .slider { width: 100%; accent-color: #FF6B00; margin: 10px 0; cursor: pointer; }
        .label { color: #FF6B00; font-weight: 800; font-size: 18px; margin-bottom: 5px; }
        #status-bar { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <model-viewer id="viewer" src="assembly.glb" ar camera-controls environment-image="neutral" exposure="1.0">
        <div class="ui-panel">
            <div class="label">STEP: <span id="stepDisplay">5</span> / 5</div>
            <input type="range" min="1" max="5" value="5" class="slider" id="assemblySlider">
            <div id="status-bar">Connecting to Model...</div>
        </div>
    </model-viewer>

    <script>
        const viewer = document.getElementById('viewer');
        const slider = document.getElementById('assemblySlider');
        const stepDisplay = document.getElementById('stepDisplay');
        const statusBar = document.getElementById('status-bar');

        function updateAssembly(step) {
            stepDisplay.innerText = step;
            
            // Access the internal scene graph
            const model = viewer.model;
            if (!model) return;

            // Deep scan through all nodes
            model.nodes.forEach(node => {
                const name = node.name || "";
                
                // Logic: Does the name contain 'part' and a number?
                if (name.toLowerCase().includes("part")) {
                    const matches = name.match(/\d+/);
                    if (matches) {
                        const partNum = parseInt(matches[0]);
                        // Show/Hide based on step
                        node.visible = (partNum <= step);
                    }
                }
            });
        }

        slider.addEventListener('input', (e) => {
            updateAssembly(parseInt(e.target.value));
        });

        viewer.addEventListener('load', () => {
            statusBar.innerText = "Scanning Structure...";
            
            // Check every 500ms until we find nodes with 'Part' in their name
            const searchTimer = setInterval(() => {
                if (viewer.model && viewer.model.nodes) {
                    const foundParts = viewer.model.nodes.filter(n => 
                        n.name && n.name.toLowerCase().includes("part")
                    );

                    if (foundParts.length > 0) {
                        clearInterval(searchTimer);
                        statusBar.innerText = "Ready: " + foundParts.length + " Parts Found";
                        console.log("Structure detected:", foundParts.map(p => p.name));
                        updateAssembly(parseInt(slider.value));
                    } else {
                        // Diagnostic: If we find nodes but NONE have the name 'Part'
                        console.log("Nodes found, but no 'Part' names detected. Node names are:", 
                                    viewer.model.nodes.map(n => n.name));
                    }
                }
            }, 500);

            // Timeout after 10 seconds if no parts are found
            setTimeout(() => {
                if (statusBar.innerText === "Scanning Structure...") {
                    clearInterval(searchTimer);
                    statusBar.innerText = "Error: No Parts Named 'Part_' Found";
                    statusBar.style.color = "red";
                }
            }, 10000);
        });
    </script>
</body>
</html>
