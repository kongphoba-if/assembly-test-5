<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Assembly Visualizer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #ffffff; font-family: sans-serif; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; display: block; }
        .ui-panel {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 280px; text-align: center; z-index: 1000;
        }
        .slider { width: 100%; accent-color: #FF6B00; margin: 10px 0; cursor: pointer; }
        .label { color: #FF6B00; font-weight: 800; font-size: 18px; margin-bottom: 5px; }
        #status-bar { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        .hint { font-size: 9px; color: #bbb; margin-top: 5px; }
    </style>
</head>
<body>

    <model-viewer id="viewer" src="assembly.glb" ar camera-controls environment-image="neutral" exposure="1.0">
        <div class="ui-panel">
            <div class="label">STEP: <span id="stepDisplay">5</span> / 5</div>
            <input type="range" min="1" max="5" value="5" class="slider" id="assemblySlider">
            <div id="status-bar">Initializing...</div>
            <div class="hint">Tip: Click a part to see its name</div>
        </div>
    </model-viewer>

    <script>
        const viewer = document.getElementById('viewer');
        const slider = document.getElementById('assemblySlider');
        const stepDisplay = document.getElementById('stepDisplay');
        const statusBar = document.getElementById('status-bar');

        function getNodes() {
            if (!viewer.model) return [];
            const symbols = Object.getOwnPropertySymbols(viewer.model);
            const hSym = symbols.find(s => s.toString().includes('hierarchy'));
            return viewer.model.nodes || viewer.model[hSym] || [];
        }

        function updateAssembly(step) {
            stepDisplay.innerText = step;
            const nodes = getNodes();
            
            nodes.forEach(node => {
                const name = node.name || "";
                if (name.toLowerCase().includes("part_")) {
                    const matches = name.match(/\d+/);
                    if (matches) {
                        const partNum = parseInt(matches[0]);
                        const isVisible = (partNum <= step);

                        // METHOD 1: VISIBILITY
                        node.visible = isVisible;

                        // METHOD 2: TELEPORTATION (The Fix)
                        // If hidden, we move it 1000 units down. If shown, back to 0.
                        if (node.translation) {
                            const yPos = isVisible ? 0 : -1000;
                            node.translation.set(node.translation.x, yPos, node.translation.z);
                        }
                    }
                }
            });
        }

        // TOOL: CLICK TO IDENTIFY
        viewer.addEventListener('click', (event) => {
            const hit = viewer.positionAndNormalFromPoint(event.clientX, event.clientY);
            if (hit) {
                // We ask model-viewer what we just clicked
                const part = viewer.queryHotspot(event); // Simple way to get node info
                // Better way: Check the console for the last clicked object
                console.log("You clicked on a part. Check the hierarchy for its name.");
            }
        });

        slider.addEventListener('input', (e) => updateAssembly(parseInt(e.target.value)));

        viewer.addEventListener('load', () => {
            setTimeout(() => {
                const nodes = getNodes();
                statusBar.innerText = "READY: " + nodes.length + " NODES SYNCED";
                updateAssembly(5);
            }, 800);
        });
    </script>
</body>
</html>
