<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Assembly Sequence Visualizer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { color-scheme: light; }
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #ffffff; 
            overflow: hidden; 
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
        }

        /* The Control Panel */
        .ui-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            width: 280px;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .label {
            color: #FF6B00;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .slider {
            width: 100%;
            cursor: pointer;
            accent-color: #FF6B00;
            height: 8px;
            border-radius: 5px;
            outline: none;
        }

        .sub-text {
            font-size: 11px;
            color: #888;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Clean up Vercel overlay if present */
        #vercel-live-feedback, .vercel-toolbar { display: none !important; }
    </style>
</head>
<body>

    <model-viewer id="viewer" 
        src="assembly.glb" 
        ar 
        camera-controls 
        touch-action="pan-y"
        shadow
